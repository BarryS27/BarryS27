name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf

      - run: cargo fmt --all -- --check
        working-directory: src-tauri

      - run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - run: cargo test --all-features
        working-directory: src-tauri

      - name: Check no telemetry endpoints
        run: |
          if grep -r "diatom\.io\|api\.diatom\|telemetry\.diatom" src-tauri/src/ 2>/dev/null | grep -v "^Binary"; then
            echo "Telemetry endpoint found — violates AXIOMS.md §8"
            exit 1
          fi

      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release --no-default-features --features custom-protocol

      - name: Check binary size <= 15 MB
        run: |
          BINARY=$(find src-tauri/target/release -maxdepth 1 -name "diatom" -o -name "diatom.exe" | head -1)
          [ -z "$BINARY" ] && echo "Binary not found — skip" && exit 0
          SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary: ${SIZE_MB} MB"
          [ "$SIZE" -gt $((15 * 1024 * 1024)) ] && echo "Exceeds 15 MB limit" && exit 1
          exit 0

  security:
    name: Security Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
        working-directory: src-tauri
